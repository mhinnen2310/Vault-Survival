# =============================================================================
# Vault Survival - Main Configuration
# =============================================================================
# This is the primary configuration file for the Vault Survival plugin.
# All gameplay settings are documented here. Edit and restart/reload the server to apply.
# =============================================================================

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ SERVER SETTINGS                                                          │
# └──────────────────────────────────────────────────────────────────────────┘
server:
  # The server name shown in various places
  name: "Vault Survival"
  # Chat prefix shown before all plugin messages (supports & color codes)
  chat_prefix: "&8[&6VS&8]"
  # Enable debug logging (verbose - only enable when troubleshooting)
  debug: false

# Dedicated staff sandbox. Hard isolation also requires the separate Paper
# runtime from staff-test-server; never enable this on the production process.
staffSandbox:
  enabled: false
  expectedWorld: "staff_test"
  allowedUuids: []
  transfer:
    enabled: true
    # These addresses are sent to the Minecraft client. Change them to public
    # hostnames when staff do not run Minecraft on the server machine itself.
    testHost: "127.0.0.1"
    testPort: 25566
    productionHost: "127.0.0.1"
    productionPort: 25565

# Spawn City — the Kingdom capital
spawn:
  # Name of the spawn city (configurable)
  cityName: "Spawn City"
  # Spawn location (set by /spawncity setspawn)
  world: "world"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0
  messages:
    welcome: "&eWelcome to Spawn City."
    leave: "&7You are leaving Spawn City."
  chunkClaim:
    maxChunks: 256
    wandMaterial: GOLDEN_AXE

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ DATABASE                                                                 │
# └──────────────────────────────────────────────────────────────────────────┘
database:
  # SQLite database file name (stored in plugin data folder)
  file: "vault_survival.db"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ CHAT FORMATTING                                                          │
# └──────────────────────────────────────────────────────────────────────────┘
chat:
  enabled: true
  # Format: staff marker + district role | district | player
  format: "%district_label% &8| %district_role% &8| %player_name%%staff_marker% &8> &f%message%"
  playerNameColor: "&c"
  noDistrictLabel: "&7OUTLANDS"
  # Rank labels mapped by access group name (lowercase)
  rankLabels:
    owner: "&4&lOWNER"
    admin: "&c&lADMIN"
    mod: "&9&lMOD"
    helper: "&a&lHELPER"
    builder: "&b&lBUILDER"
    developer: "&5&lDEV"
    vip: "&6&lVIP"
    default: "&7PLAYER"
  # District label configuration
  district:
    enabled: true
    format: "&e%district%"
    noDistrict: "&7OUTLANDS"
  # Show rank prefix before player names in tab list
  tab_prefix: true
  # Show rank prefix in player name tags (above head)
  nametag_prefix: true
  channels:
    default: GLOBAL
    rememberLastChannel: true
    localRadius: 100
    enableAliases: true
    allowGuestDistrictChat: false
  spy:
    enabled: true
    auditSpyToggle: true

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ CURRENCY                                                                 │
# └──────────────────────────────────────────────────────────────────────────┘
currency:
  # Name of a single coin
  name: "Coin"
  # Name of multiple coins
  name_plural: "Coins"
  # Custom model data ID for cash items (from resource pack)
  custom_model_data: 1001
  # Material used for physical cash items
  material: "GOLD_NUGGET"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ VAULTS                                                                   │
# └──────────────────────────────────────────────────────────────────────────┘
vaults:
  # Cooldown in minutes before a breached vault can be breached again
  breach_cooldown_minutes: 60
  # Maximum percentage that can ever be stolen from a vault (0-100)
  max_breach_percent: 50.0
  # Material used for vault blocks in the world
  vault_material: "BARREL"

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ STAFF MODE                                                               │
# └──────────────────────────────────────────────────────────────────────────┘
staffmode:
  # Whether staff mode swaps inventories (separates staff/gameplay items)
  separate_inventories: true
  # Game mode set when entering staff mode (CREATIVE, SPECTATOR, SURVIVAL)
  gamemode: "CREATIVE"
  # Effect applied to staff in staffmode to make them visible
  # Options: GLOWING, NONE
  visibility_effect: "GLOWING"
  # Color of the glowing effect (for Paper 1.21+)
  glow_color: "RED"
  # Chat prefix shown when staff types while in staffmode
  staffmode_prefix: "&c[STAFF]"
  # Allow staffmode users to interact with chests/containers
  allow_container_interact: false
  # Allow staffmode users to drop items
  allow_item_drop: false
  # Allow staffmode users to pick up items
  allow_item_pickup: false
  # Revert all blocks placed/broken in staffmode when toggling off
  revert_blocks_on_exit: true
  # Maximum number of blocks tracked per staffmode session (prevents memory issues)
  max_tracked_blocks: 10000
  # Players with this permission can bypass ALL staffmode restrictions
  # Default: only owner rank has this. Use /staffmode * to toggle bypass.
  bypass_permission: "vs.staffmode.bypass"

# Paper handles real chunk obfuscation. Enable anti-xray in Paper's world configuration:
# anti-xray.enabled: true, engine-mode: 2, max-block-height: 64, update-radius: 2.
# Do not rely on resource-pack-only fake block IDs for security.
security:
  anticheat:
    enabled: true
    autoBan: false
    scoreDecayMinutes: 30
    movementMaxDistanceSquared: 36
    fastBreakMinIntervalMs: 45
    combatMaxReachSquared: 22
    combatMinAttackIntervalMs: 35
    liveAlertMinimumScore: 3
  antiXray:
    managedByPaper: true
    requireEngineMode: 2
    hideLavaCaves: true
  suspiciousPayout:
    minimumAmount: 25000
    windowMillis: 600000
    burstCount: 5
    burstTotal: 50000

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ DISTRICTS                                                                │
# └──────────────────────────────────────────────────────────────────────────┘
districts:
  # Measured from claim edge to Spawn City / another district claim edge.
  min_distance_from_spawn: 500
  min_distance_between: 350
  selection:
    # New districts must form one filled rectangle of exactly this many chunks.
    requiredChunks: 15
    wandMaterial: GOLDEN_AXE
    timeoutMinutes: 20
    overlay:
      enabled: true
      maxPreviewChunks: 64
    # Claim capacity grows with the district development level.
    chunksByLevel:
      0: 15
      1: 20
      2: 30
      3: 45
      4: 65
      5: 90
      6: 120
  marketZone:
    # One rectangular district public market. Its cap grows with the owned claim.
    maxPercentOfDistrict: 0.40
  stationPlatform:
    # Platform chunk cap also grows as the district's claim grows with levels.
    maxPercentOfDistrict: 0.25
  npcPlanning:
    # /district npcs gives one facing marker for each entry below.
    enabled: true
    level0: [CLERK, JOB_BOARD]
    level1: [MARKET_STEWARD]
    level2: [CONDUCTOR]
  laws:
    maxChangesPerDay: 5
  evidence:
    expireDays: 14

districtDevelopment:
  scaling:
    enabled: true
    useGlobalPopulationScaling: true
    useDistrictPopulationScaling: true
    activeWindowDays: 7
    lowPopulation:
      enabled: true
      globalActivePlayersThreshold: 20
      requirementMultiplier: 0.70
      upkeepMultiplier: 0.60
      downgradeDelayMultiplier: 2.0
      maintenanceDecayMultiplier: 0.50
    districtSizeBands:
      tiny: { activeMembersMin: 1, activeMembersMax: 3, requirementMultiplier: 0.65, upkeepMultiplier: 0.60, maxLevelSoftCap: 3 }
      small: { activeMembersMin: 4, activeMembersMax: 8, requirementMultiplier: 1.00, upkeepMultiplier: 1.00, maxLevelSoftCap: 4 }
      medium: { activeMembersMin: 9, activeMembersMax: 15, requirementMultiplier: 1.35, upkeepMultiplier: 1.30, maxLevelSoftCap: 5 }
      large: { activeMembersMin: 16, activeMembersMax: 999, requirementMultiplier: 1.75, upkeepMultiplier: 1.80, maxLevelSoftCap: 6 }
    contributionCaps:
      lowLevelsMaxSinglePlayerPercent: 70
      midLevelsMaxSinglePlayerPercent: 50
      highLevelsMaxSinglePlayerPercent: 35
    dormantDistricts:
      enabled: true
      inactiveDaysBeforeDormant: 14
      dormantUpkeepMultiplier: 0.25
      dormantCanUpgrade: false
      dormantDowngradePausedIfGlobalLowPop: true

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ RESTORATION                                                              │
# └──────────────────────────────────────────────────────────────────────────┘
restoration:
  # Minutes before structure blocks restore (when repair points available)
  normal_delay_minutes: 10
  # Minutes before structure blocks restore (when repair points exhausted)
  exhausted_delay_minutes: 30
  # Daily repair points per district repair crew
  daily_repair_points: 500
  # Daily wage cost for repair crew (paid from district treasury)
  daily_wage: 1000

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ MERCHANT                                                                 │
# └──────────────────────────────────────────────────────────────────────────┘
merchant:
  # Maximum number of active orders a merchant can have at once
  max_active_orders: 10
  # Default duration for orders in hours before they expire (0 = never)
  default_expire_hours: 168

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ RAIL (District Train Stations)                                           │
# └──────────────────────────────────────────────────────────────────────────┘
rail:
  enabled: true
  # Default ticket price for new stations
  defaultTicketPrice: 100
  # Default upkeep cost deducted from district treasury
  defaultUpkeepCost: 5000
  # Kingdoms tax percent on ticket sales (goes to Spawn City)
  defaultKingdomTaxPercent: 10
  # Application fee paid from district treasury
  applicationFee: 10000
  # Minimum platform radius in blocks
  minPlatformRadius: 3
  # Journey timing settings
  journey:
    # Ticks for the full boarding window (20 ticks = 1 second)
    boardingWindowTicks: 200
    # Minimum ticks before boarding opens
    minBoardingTicks: 60
    # Y-offset for the train car above the platform
    trainCarYOffset: 5.0

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ DISTRICT MARKET (Merchant NPC Shops)                                     │
# └──────────────────────────────────────────────────────────────────────────┘
districtMarket:
  enabled: true
  requireMarketZone: true
  maxNpcPerMerchant: 3
  maxNpcPerDistrict: 25
  minTaxPercent: 0
  maxTaxPercent: 50
  defaultTaxPercent: 10
  merchantLockerEnabled: true
  merchantNpc:
    killable: true
    respawnMinutes: 15

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ MARKET                                                                   │
# └──────────────────────────────────────────────────────────────────────────┘
market:
  # Tax percentage taken from each Auction Hall sale (0-100)
  tax_percent: 5.0
  # Default listing duration in hours
  default_listing_duration_hours: 48
  # Maximum custom listing duration accepted by commands.
  max_listing_duration_hours: 168

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ BREACH                                                                   │
# └──────────────────────────────────────────────────────────────────────────┘
breach:
  # Maximum distance (blocks) the thief can be from the vault during breach
  max_distance_blocks: 8
  # Seconds the thief cannot teleport after any breach (success or fail)
  escape_cooldown_seconds: 30
  # Ticks between indicator movements in the Timing Tumbler stage
  tumbler_speed_ticks: 6
  # Maximum attempts in the Timing Tumbler stage
  tumbler_max_attempts: 3
  # Duration of the Pressure Balance stage (in ticks, 20 ticks = 1 second)
  pressure_duration_ticks: 80
  # Time limit for the Final Dial stage (in ticks)
  dial_time_ticks: 200
  # Maximum attempts in the Final Dial stage
  dial_max_attempts: 5

# VS-WorldEdit
regions:
  visualization:
    enabled: true
    defaultDurationSeconds: 30
    defaultMode: WHILE_EDITING
    particles:
      perimeterSpacing: 0.5
      verticalSpacing: 0.5
      cornerDensityMultiplier: 2.0
      maxParticlesPerTickPerPlayer: 2500
      renderIntervalTicks: 5
    grid:
      sideGridEnabled: true
      sideGridSpacing: 4
      floorGridEnabled: true
      floorGridSpacing: 4
      topPerimeterEnabled: true
    scaling:
      dynamicSpacingEnabled: true
      largeRegionVolumeThreshold: 100000
      veryLargeRegionVolumeThreshold: 1000000
      largeRegionSpacingMultiplier: 2.0
      veryLargeRegionSpacingMultiplier: 4.0
    labels:
      enabled: true
      showPos1: true
      showPos2: true
      showRegionType: true
      showDimensions: true
      showVolume: true

# VS-WorldEdit
vsworldedit:
  maxBlocksPerOperation: 1000000
  blocksPerTick: 500
  maxUndoOperations: 10
  requireConfirmationAboveBlocks: 10000

vsWorldEdit:
  patterns:
    allowNumericAirAlias: true
    normalizePercentages: true
    maxPatternEntries: 32
    defaultMode: RANDOM
    allowLegacyCommaWeights: true
  safety:
    confirmationThresholdBlocks: 10000
    maxBlocksPerOperation: 1000000
    requireConfirmationForAirOperations: true

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ RESOURCE PACK                                                            │
# └──────────────────────────────────────────────────────────────────────────┘
resourcepack:
  # URL to the server resource pack (leave empty to disable)
  url: ""
  # SHA-1 hash of the resource pack file (required for proper loading)
  hash: ""
  # Force players to use the resource pack
  required: false

# GitHub release updater
updates:
  enabled: true
  githubOwner: "mhinnen2310"
  githubRepo: "Vault-Survival"
  assetName: "VaultSurvival.jar"

# Native Minecraft dialogs / fallback menus
dialogs:
  enabled: true
  preferNativeDialogs: true
  fallbackToInventoryGui: true
  quickActions:
    enabled: true
    installDatapackToWorld: true
