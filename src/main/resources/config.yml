# =============================================================================
# Vault Survival configuration
# =============================================================================
# Configuration version used by future migrations. Do not change manually.
configVersion: 4

# Reload-safe settings can be applied with /vs reload. World, database, command,
# schematic, and module lifecycle changes should be followed by a full restart.

# -----------------------------------------------------------------------------
# 1. SERVER, STORAGE, UPDATES
# -----------------------------------------------------------------------------
server:
  # Display name used by plugin status screens.
  name: "Vault Survival"
  # Prefix for plugin messages. Legacy & colour codes are supported.
  chat_prefix: "&8[&6VS&8]"
  # Extra diagnostic logging. Leave false on production unless troubleshooting.
  debug: false

database:
  # SQLite file inside plugins/VaultSurvival. Existing data is never discarded.
  file: "vault_survival.db"

redis:
  # Reserved optional cross-server cache. The core plugin works without Redis.
  enabled: false
  host: "localhost"
  port: 6379
  # Keep empty when Redis authentication is disabled.
  password: ""

updates:
  # Allow /vs update to check the configured GitHub release feed.
  enabled: true
  githubOwner: "mhinnen2310"
  githubRepo: "Vault-Survival"
  # Exact release asset name downloaded by the updater.
  assetName: "VaultSurvival.jar"

# -----------------------------------------------------------------------------
# 2. ISOLATED STAFF SANDBOX
# -----------------------------------------------------------------------------
# Real isolation requires the separate Paper process in staff-test-server.
# Never point the production process at the sandbox database or world.
staffSandbox:
  enabled: false
  expectedWorld: "staff_test"
  # Only these UUIDs may join when sandbox mode is enabled.
  allowedUuids: []
  transfer:
    # Allows /staffmode test and /staffmode return server transfers.
    enabled: true
    testHost: "127.0.0.1"
    testPort: 25566
    productionHost: "127.0.0.1"
    productionPort: 25565

# -----------------------------------------------------------------------------
# 3. STAFFMODE AND AUDITED STAFF UTILITIES
# -----------------------------------------------------------------------------
staffmode:
  # Swap gameplay inventory for a clean staff inventory on entry.
  separate_inventories: true
  # CREATIVE, SPECTATOR, ADVENTURE, or SURVIVAL.
  gamemode: "CREATIVE"
  # GLOWING or NONE.
  visibility_effect: "GLOWING"
  glow_color: "RED"
  staffmode_prefix: "&c[STAFF]"

  # Default staffmode safety restrictions. Owner build grants do not persist
  # after logout, staffmode exit, or plugin disable.
  allow_container_interact: false
  allow_item_drop: false
  allow_item_pickup: false
  revert_blocks_on_exit: true
  max_tracked_blocks: 10000
  bypass_permission: "vs.staffmode.bypass"

  buildPermissions:
    # Temporary permissions attached only during an owner-approved build session.
    # %world% expands once per loaded world. Never place '*' or 'vs.*' here.
    temporaryPermissionNodes:
      - "worldguard.region.bypass.%world%"

  utilities:
    speed:
      # Logical /speed range. Values are safely mapped to Bukkit's -1..1 range.
      min: 0.0
      max: 10.0
    weather:
      # Maximum /weather duration in seconds; hard code cap is seven days.
      maxDurationSeconds: 86400
    breaker:
      # Accepted /breaker square sizes. Values outside 3..9 are ignored.
      allowedSizes: [3, 4, 5, 6, 7, 8, 9]
      # If true, extra blocks must match the originally broken material.
      sameMaterialOnly: false
      # Prevent accidental destruction of inventories and machine containers.
      skipContainers: true
      # Physics can cause sand, fluids, redstone, and neighbours to update.
      applyPhysics: false
      # These materials are never removed by the staff area breaker.
      protectedMaterials:
        - BEDROCK
        - BARRIER
        - STRUCTURE_BLOCK
        - JIGSAW
        - COMMAND_BLOCK
        - CHAIN_COMMAND_BLOCK
        - REPEATING_COMMAND_BLOCK
        - END_PORTAL
        - END_PORTAL_FRAME
        - END_GATEWAY
        - NETHER_PORTAL
        - REINFORCED_DEEPSLATE

# -----------------------------------------------------------------------------
# 4. SPAWN CITY
# -----------------------------------------------------------------------------
spawn:
  cityName: "Spawn City"
  # Set safely with /spawncity setspawn.
  world: "world"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0
  messages:
    welcome: "&eWelcome to Spawn City."
    leave: "&7You are leaving Spawn City."
  blockClaim:
    # Maximum horizontal area selected with two exact block corners.
    maxAreaBlocks: 65536
    wandMaterial: GOLDEN_AXE

spawnCity:
  # ADMIN_FUNDED prevents Spawn City from depending on a remote/virtual treasury.
  economyMode: ADMIN_FUNDED

# -----------------------------------------------------------------------------
# 5. PLAYER DIALOGS, CHAT, AND RESOURCE PACK
# -----------------------------------------------------------------------------
dialogs:
  enabled: true
  # Use Paper's native dialog API when the server supports it.
  preferNativeDialogs: true
  # Inventory GUI is used only when native dialogs are unavailable.
  fallbackToInventoryGui: true
  quickActions:
    enabled: true
    # Installs the generated quick-actions datapack into the active world.
    installDatapackToWorld: true

chat:
  enabled: true
  # Available tokens include district_label, district_role, player_name,
  # staff_marker, rank_label, and message.
  format: "%district_label% &8| %district_role% &8| %player_name%%staff_marker% &8> &f%message%"
  playerNameColor: "&c"
  noDistrictLabel: "&7OUTLANDS"
  rankLabels:
    owner: "&4&lOWNER"
    admin: "&c&lADMIN"
    mod: "&9&lMOD"
    helper: "&a&lHELPER"
    builder: "&b&lBUILDER"
    developer: "&5&lDEV"
    vip: "&6&lVIP"
    default: "&7PLAYER"
  district:
    enabled: true
    format: "&e%district%"
    noDistrict: "&7OUTLANDS"
  tab_prefix: true
  nametag_prefix: true
  channels:
    # GLOBAL, LOCAL, DISTRICT, ALLY, POLICE, MERCHANT, STAFF, or HELP.
    default: GLOBAL
    rememberLastChannel: true
    localRadius: 100
    enableAliases: true
    allowGuestDistrictChat: false
  spy:
    enabled: true
    auditSpyToggle: true

resourcepack:
  # Leave URL empty to disable automatic resource-pack delivery.
  url: ""
  # SHA-1 hash without spaces. Required when a URL is configured.
  hash: ""
  required: false

# -----------------------------------------------------------------------------
# 6. SECURITY AND ANTI-ABUSE
# -----------------------------------------------------------------------------
# Paper must provide real anti-xray obfuscation. Configure engine-mode 2 in the
# Paper world configuration; the values below verify and report that setup.
security:
  anticheat:
    enabled: true
    # Detection remains alert-first; automatic bans are intentionally optional.
    autoBan: false
    scoreDecayMinutes: 30
    movementMaxDistanceSquared: 36
    fastBreakMinIntervalMs: 45
    combatMaxReachSquared: 22
    combatMinAttackIntervalMs: 35
    liveAlertMinimumScore: 3
  antiXray:
    managedByPaper: true
    requireEngineMode: 2
    hideLavaCaves: true
  suspiciousPayout:
    minimumAmount: 25000
    windowMillis: 600000
    burstCount: 5
    burstTotal: 50000

# -----------------------------------------------------------------------------
# 7. PHYSICAL ECONOMY AND VAULTS
# -----------------------------------------------------------------------------
currency:
  name: "Coin"
  name_plural: "Coins"
  custom_model_data: 1001
  material: "GOLD_NUGGET"

vaults:
  breach_cooldown_minutes: 60
  # Maximum percentage a successful breach can remove, from 0 to 100.
  max_breach_percent: 50.0
  vault_material: "BARREL"

districtTreasury:
  enabled: true
  maxVaultsPerDistrict: 3
  requireInsideDistrict: true
  interactDistanceBlocks: 6
  allowedRoles: [MAYOR, CO_MAYOR, TREASURER]
  concealLocationsFromUnauthorized: true
  requireEmptyBeforeRemoval: true
  # Compatibility switch remains false: treasury banking is physical and local.
  legacyRemoteBankingEnabled: false
  breach:
    # Unauthorized players need a real breach kit and must remain nearby for this channel.
    channelSeconds: 5
    stealPercent: 20.0
    lockdownSeconds: 1800

breach:
  max_distance_blocks: 8
  escape_cooldown_seconds: 30
  tumbler_speed_ticks: 6
  tumbler_max_attempts: 3
  pressure_duration_ticks: 80
  dial_time_ticks: 200
  dial_max_attempts: 5

# -----------------------------------------------------------------------------
# 8. DISTRICTS, BLOCK CLAIMS, NPC PLANNING, DEVELOPMENT
# -----------------------------------------------------------------------------
districts:
  restrictedLand:
    # Mayors can define this many exact-block restricted areas per district.
    maxAreasPerDistrict: 8
    # One restricted area may cover at most this fraction of the district claim.
    maxPercentOfDistrict: 0.25

  # Horizontal block distance measured edge-to-edge.
  min_distance_from_spawn: 500
  min_distance_between: 350
  selection:
    # Exact horizontal area required for a new two-corner block claim.
    requiredAreaBlocks: 3840
    wandMaterial: GOLDEN_AXE
    timeoutMinutes: 20
    overlay:
      enabled: true
      # Preview safety cap; selection itself remains exact block-based.
      maxPreviewBlocks: 16384
    # Maximum horizontal claim area at each district development level.
    areaBlocksByLevel:
      0: 3840
      1: 5120
      2: 7680
      3: 11520
      4: 16640
      5: 23040
      6: 30720
  marketZone:
    # Fraction of the district's exact block area available to its market zone.
    maxPercentOfDistrict: 0.40
  stationPlatform:
    # Fraction of district block area available to a station platform.
    maxPercentOfDistrict: 0.25
  npcPlanning:
    enabled: true
    # NPC types become available by district level. `/district npcs start`
    # gives markers only for unlocked NPCs that are currently missing.
    level0: [CLERK, JOB_BOARD]
    level1: [MARKET_STEWARD]
    level2: [CONDUCTOR]
  laws:
    maxChangesPerDay: 5
  evidence:
    expireDays: 14

districtLaws:
  # Maximum simultaneous pending changes per district. Existing pending values can still be edited.
  maxPendingChanges: 5

districtDevelopment:
  scaling:
    enabled: true
    useGlobalPopulationScaling: true
    useDistrictPopulationScaling: true
    activeWindowDays: 7
    lowPopulation:
      enabled: true
      globalActivePlayersThreshold: 20
      requirementMultiplier: 0.70
      upkeepMultiplier: 0.60
      downgradeDelayMultiplier: 2.0
      maintenanceDecayMultiplier: 0.50
    districtSizeBands:
      tiny:
        activeMembersMin: 1
        activeMembersMax: 3
        requirementMultiplier: 0.65
        upkeepMultiplier: 0.60
        maxLevelSoftCap: 3
      small:
        activeMembersMin: 4
        activeMembersMax: 8
        requirementMultiplier: 1.00
        upkeepMultiplier: 1.00
        maxLevelSoftCap: 4
      medium:
        activeMembersMin: 9
        activeMembersMax: 15
        requirementMultiplier: 1.35
        upkeepMultiplier: 1.30
        maxLevelSoftCap: 5
      large:
        activeMembersMin: 16
        activeMembersMax: 999
        requirementMultiplier: 1.75
        upkeepMultiplier: 1.80
        maxLevelSoftCap: 6
    contributionCaps:
      lowLevelsMaxSinglePlayerPercent: 70
      midLevelsMaxSinglePlayerPercent: 50
      highLevelsMaxSinglePlayerPercent: 35
    dormantDistricts:
      enabled: true
      inactiveDaysBeforeDormant: 14
      dormantUpkeepMultiplier: 0.25
      dormantCanUpgrade: false
      dormantDowngradePausedIfGlobalLowPop: true

restoration:
  normal_delay_minutes: 10
  exhausted_delay_minutes: 30
  daily_repair_points: 500
  # Physical district treasury wage per day.
  daily_wage: 1000

# -----------------------------------------------------------------------------
# 9. MERCHANTS, MARKETS, AND RAIL
# -----------------------------------------------------------------------------
merchant:
  max_active_orders: 10
  # Default order lifetime; 0 means no automatic expiry.
  default_expire_hours: 168

districtMarket:
  enabled: true
  # Merchant NPC shops must be inside the district's selected market zone.
  requireMarketZone: true
  maxNpcPerMerchant: 3
  maxNpcPerDistrict: 25
  minTaxPercent: 0
  maxTaxPercent: 50
  defaultTaxPercent: 10
  # Maximum accepted value in the native per-item shop price form.
  maxItemPrice: 1000000000
  merchantLockerEnabled: true
  merchantNpc:
    killable: true
    respawnMinutes: 15

market:
  # Auction Hall sale tax, from 0 to 100 percent.
  tax_percent: 5.0
  default_listing_duration_hours: 48
  max_listing_duration_hours: 168

rail:
  enabled: true
  defaultTicketPrice: 100
  # Upper bound used by the native station ticket-price form.
  maxTicketPrice: 1000000
  defaultUpkeepCost: 5000
  defaultKingdomTaxPercent: 10
  applicationFee: 10000
  minPlatformRadius: 3
  journey:
    # 20 ticks equals one second.
    boardingWindowTicks: 200
    minBoardingTicks: 60
    trainCarYOffset: 5.0

travel:
  # All normal player teleports wait this many seconds. Moving cancels them.
  teleportWarmupSeconds: 3
  tpa:
    # Requests disappear automatically; acceptance is always explicit.
    timeoutSeconds: 60
  homes:
    # Every player gets one home. Rank groups can be mapped to two or three.
    defaultLimit: 1
    rankLimits:
      premium: 2
      premium_plus: 3
      vip: 2
      vip_plus: 3

# -----------------------------------------------------------------------------
# 10. REGION VISUALIZATION
# -----------------------------------------------------------------------------
regions:
  visualization:
    enabled: true
    defaultDurationSeconds: 30
    # WHILE_EDITING, TEN_SECONDS, THIRTY_SECONDS, SIXTY_SECONDS, or UNTIL_HIDDEN.
    defaultMode: WHILE_EDITING
    particles:
      perimeterSpacing: 0.5
      verticalSpacing: 0.5
      cornerDensityMultiplier: 2.0
      maxParticlesPerTickPerPlayer: 2500
      renderIntervalTicks: 5
    grid:
      sideGridEnabled: true
      sideGridSpacing: 4
      floorGridEnabled: true
      floorGridSpacing: 4
      topPerimeterEnabled: true
    scaling:
      dynamicSpacingEnabled: true
      largeRegionVolumeThreshold: 100000
      veryLargeRegionVolumeThreshold: 1000000
      largeRegionSpacingMultiplier: 2.0
      veryLargeRegionSpacingMultiplier: 4.0
    labels:
      enabled: true
      showPos1: true
      showPos2: true
      showRegionType: true
      showDimensions: true
      showVolume: true

# -----------------------------------------------------------------------------
# 11. VS-WORLDEDIT, PATTERNS, UNDO, SCHEMATICS
# -----------------------------------------------------------------------------
# The lowercase section contains execution and schematic settings retained for
# compatibility. Pattern parsing and safety use the canonical vsWorldEdit tree.
vsworldedit:
  maxBlocksPerOperation: 1000000
  blocksPerTick: 500
  maxUndoOperations: 10
  requireConfirmationAboveBlocks: 10000
  schematics:
    enabled: true
    # Put vanilla Structure Block .nbt files directly in
    # plugins/VaultSurvival/schematics. Subfolders, symlinks, .schem, and
    # legacy .schematic files are rejected deliberately.
    maxFileSizeBytes: 16777216
    maxBlocks: 250000
    maxDimensionBlocks: 256
    confirmationThresholdBlocks: 10000
    alwaysRequireConfirmation: false
    # True also pastes air from the structure and can clear existing blocks.
    pasteAir: true

vsWorldEdit:
  patterns:
    allowNumericAirAlias: true
    normalizePercentages: true
    maxPatternEntries: 32
    # SINGLE, RANDOM, WEIGHTED_RANDOM, or GRID.
    defaultMode: RANDOM
    allowLegacyCommaWeights: true
  safety:
    confirmationThresholdBlocks: 10000
    maxBlocksPerOperation: 1000000
    requireConfirmationForAirOperations: true
